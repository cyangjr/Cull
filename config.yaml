final_score_weights:
  sharpness: 0.4
  exposure: 0.15
  white_balance: 0.15
  aesthetic: 0.3

sharpness_gate_threshold: 0.3

# Phase C (kept for forward compatibility; not used in Phase A MVP)
motion_blur_score_penalty: 0.5
yolo_confidence_threshold: 0.4
hash_threshold: 8
timestamp_window_s: 2.0

# Milestone C toggles (safe defaults; heavy ML stages can remain off)
enable_router: true
enable_object_detector: true
enable_saliency_detector: true
enable_face_detector: true
enable_motion_blur: true
enable_aesthetic: true
enable_composition_tags: true
enable_dedup: true

# Milestone C knobs
min_face_detection_confidence: 0.5
saliency_peak_threshold: 0.6

# Memory/perf
batch_size: 16
release_pixel_data: true

# CPU parallel processing
# num_workers: Number of parallel worker processes
#   - null (or omit): Auto-detect, use 40% of CPU cores (recommended, tested optimal)
#   - 0: Disable multiprocessing, run sequentially (debugging/testing)
#   - 1-N: Use exactly N workers (clamped to safe range: leaves 1 core free)
# Examples:
#   20-core CPU: null → 8 workers (tested optimal), 10 → 10 workers
#   8-core CPU: null → 3 workers, 12 → 7 workers (max safe)
#   4-core CPU: null → 2 workers, 8 → 3 workers (max safe)
# Performance tested 2026-04-06: 8 workers = 1.25x speedup on 20-core system
num_workers: null  # Auto-detect (40% of cores, tested optimal)
